services:
  campus-drive:
    build: .
    container_name: campus-drive
    restart: unless-stopped
    env_file: .env
    # stdin/tty so you can see & scan the WhatsApp QR and the MS device code
    # on first run:  docker compose up   (then detach with Ctrl-P Ctrl-Q)
    stdin_open: true
    tty: true
    volumes:
      # Persist the WhatsApp session + encrypted token cache across restarts,
      # so you don't re-scan the QR or re-login to Microsoft every deploy.
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.wwebjs_cache:/app/.wwebjs_cache
      - ./.secrets:/app/.secrets
