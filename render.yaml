# Render Blueprint — deploy this repo as a free, always-on Docker web service.
# In Render: New -> Blueprint -> connect this repo. Render reads this file and
# creates the service; you then fill the secret values (marked sync:false) in the
# dashboard. See DEPLOY.md section 4 for the full walkthrough.
services:
  - type: web
    name: campus-drive-automation
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      # Secrets — Render prompts for these; they are NOT stored in the repo.
      - key: NVIDIA_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GAS_WEBAPP_URL
        sync: false
      - key: GAS_TOKEN
        sync: false
      - key: WA_ALLOWED_CHATS
        sync: false
      # Non-secret defaults.
      - key: WA_REQUIRE_KEYWORDS
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
