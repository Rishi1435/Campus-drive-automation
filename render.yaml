# Render Blueprint — two free services: a Docker backend + a static React frontend.
# In Render: New -> Blueprint -> connect this repo. Render reads this file and
# creates BOTH services; you then fill the values marked sync:false.
#
# NOTE (free tier): drives/users live in MongoDB (persistent), but the WhatsApp
# session is on the instance's EPHEMERAL disk and free services SLEEP after ~15
# min idle — so the WhatsApp link drops and needs a re-scan after a sleep/restart.
# Fine to try; for always-on capture use a paid instance or your own machine.
services:
  # ---- Backend: WhatsApp worker + API + Socket.io -------------------------
  - type: web
    name: campus-drive-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium

  # ---- Frontend: static React (Vite) build --------------------------------
  - type: web
    name: campus-drive-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    # SPA fallback so client-side routes (/login, /register) work on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to the backend service's URL after it deploys, e.g.
      #   https://campus-drive-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false
